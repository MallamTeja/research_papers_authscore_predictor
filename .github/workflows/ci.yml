name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f req.txt ]; then pip install -r req.txt; fi
          pip install pytest fastapi httpx numpy pandas lightgbm sentence-transformers
          
      - name: Run tests
        run: |
          pytest testmain.py -v
